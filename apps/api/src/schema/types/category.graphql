type Category {
  id: ID!
  name: String!
  slug: String!
  description: String
  parentId: ID
  parent: Category
  children(limit: Int = 50, offset: Int = 0): [Category!]!
  icon: String
  products: [Product!]!
  createdAt: DateTime!
}

input CreateCategoryInput {
  name: String!
  slug: String!
  description: String
  parentId: ID
  icon: String
}

input UpdateCategoryInput {
  name: String
  slug: String
  description: String
  parentId: ID
  icon: String
}

extend type Query {
  categories: [Category!]!
  category(id: ID!): Category
}

extend type Mutation {
  createCategory(input: CreateCategoryInput!): Category!
  updateCategory(id: ID!, input: UpdateCategoryInput!): Category!
  deleteCategory(id: ID!): Boolean!
}
