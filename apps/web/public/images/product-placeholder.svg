  </defs>
  <rect width="800" height="600" fill="url(#bg)" />
  <rect x="210" y="145" width="380" height="310" rx="24" fill="url(#card)" stroke="#6aa7ff" stroke-opacity="0.4" />
  <rect x="250" y="200" width="300" height="170" rx="14" stroke="#9cc2ff" stroke-opacity="0.45" fill="none" />
  <circle cx="325" cy="286" r="28" fill="#9cc2ff" fill-opacity="0.3" />
